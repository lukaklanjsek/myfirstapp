{% extends "syncope/base.html" %}

{% block title %}Delete Project{% endblock %}

{% block content %}
<h2>Delete Project?</h2>

<p>Are you sure you want to delete <strong>{{ project.title }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="danger">Delete</button>
    <a href="{%  url 'syncope:project_detail' url_username project.pk %}">Cancel</a>
</form>

{% endblock %}
